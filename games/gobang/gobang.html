<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋</title>
    <link rel="icon" href="../../images/head.jpg">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 20px 16px 32px;
            background: #f7faf8;
            color: #161a17;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .game-shell {
            width: min(100%, 560px);
            margin: 0 auto;
        }

        #c1:focus-visible {
            outline: 3px solid rgba(15, 118, 110, 0.32);
            outline-offset: 3px;
        }

        #c1 {
            display: block;
            width: min(450px, 100%);
            height: auto;
            aspect-ratio: 1;
            margin: 0 auto;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 18px 44px rgba(22, 26, 23, 0.12);
            touch-action: manipulation;
        }
    </style>
    <script src="./index.js" defer></script>
</head>

<body>
    <main class="game-shell">
        <canvas id="c1" width="450" height="450" tabindex="0" aria-label="五子棋"></canvas>
    </main>
</body>

</html>
