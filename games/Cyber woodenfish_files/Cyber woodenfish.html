<!DOCTYPE html>
<!-- saved from url=(0031)https://haiyong.site/moyu/muyu/ -->
<html lang="zh-CN">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电子木鱼</title>
  <meta name="keywords" content="电子木鱼,自动功德机,机甲佛祖,赛博真经,功德+1">
  <meta name="description" content="敲电子木鱼，使用自动功德机，见机甲佛祖，修赛博真经。无需登录即可每日敲木鱼，每敲一下功德+1，心中的焦虑似乎也减少了呢。">
  <link rel="icon" href="../../images/head.jpg">
  <link rel="stylesheet" href="./style.css">
</head>

<body data-theme="dark">
  <header id="headerTag">
    <h2>电子木鱼</h2>
    <p>敲电子木鱼，见机械佛祖，得赛博真经</p>
    <nav class="navList">
      <button type="button" id="lightOrDarkModelBtn" title="昼夜模式" aria-label="切换到浅色模式" onclick="lightOrDarkModel()">
        <span id="lightOrDarkIcon" aria-hidden="true">☾</span>
      </button>
      <button type="button" id="settingsBtn" title="更多设置" aria-label="打开设置" aria-controls="settingsBox" aria-expanded="false" onclick="settingsBoxDisplay()">
        <span id="settingsIcon" aria-hidden="true">⚙</span>
      </button>
    </nav>
  </header>
  <main id="mainTag">
    <section id="muyvSection">
      <p>功德</p>
      <p>-=&nbsp;<span id="spanTag">6</span>&nbsp;=-</p>
      <div id="gongDePlus"></div>
      <img id="muyvImg" src="./muyv.webp" alt="木鱼" role="button" tabindex="0" onclick="muyvAudioFunction(event)">
    </section>
  </main>
  <div id="settingsBox" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="settingsTitle">
    <button type="button" id="settingsBoxExitIcon" aria-label="关闭设置" onclick="settingsBoxDisplay()"><span aria-hidden="true">×</span></button>
    <h2 id="settingsTitle">设置</h2>
    <p>在此设置独属于你的木鱼</p>
    <hr>
    <h3>常用</h3>
    <button type="button" class="action-button" onclick="GautamaLaugh()">
      佛祖陪你笑
    </button>
    <button type="button" class="action-button" onclick="autoClick()">
      自动积功德
    </button>
    <hr>
    <h3>木鱼音效（-20功德）</h3>
    <button type="button" class="action-button" onclick="changeAudio(1)">
      浓厚
    </button>
    <button type="button" class="action-button" onclick="changeAudio(2)">
      清脆
    </button>
    <button type="button" class="action-button" onclick="changeAudio(3)">
      坤音
    </button>
    <hr>
    <h3>背景音乐</h3>
    <p>---------清音流水--------</p>
    <audio src="./music/清音流水.mp3" controls="" preload="none" loop=""></audio>
    <p>---------二泉映月--------</p>
    <audio src="./music/二泉映月中国古典乐曲经典珍藏.mp3" controls="" preload="none" loop=""></audio>
    <p>---------般若心经--------</p>
    <audio src="./music/般若心経 (cho ver.) [long mix] - 薬師寺寛邦、キッサコ.flac" controls="" preload="none" loop=""></audio>
    <p>---------般若心经（中文）--------</p>
    <audio src="./music/般若心经 (chorus ver.)[中文版] - 薬師寺寛邦、キッサコ.flac" controls="" preload="none" loop=""></audio>
    <p>---------大悲咒--------</p>
    <audio src="./music/晚课三皈依大悲咒伽蓝赞智文法师.mp3" controls="" preload="none" loop=""></audio>

  </div>
  <footer id="footerTag">
    <div id="footer-wrap">
      <p>电脑可使用空格或回车键敲击~</p>
    </div>
  </footer>
  <div id="mask" onclick="settingsBoxDisplay()"></div>
  <script src="./audio.js"></script>
  <script src="./main.js"></script>


</body>

</html>
