<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="按范围、数量和重复规则生成随机数。">
    <title>随机数生成器 | Starki</title>
    <link rel="icon" href="../images/head.jpg">
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header class="site-header">
        <a class="brand" href="../index.html" aria-label="返回 Starki 主页">
            <img src="../images/head.jpg" alt="Starki 的头像">
            <span>Starki</span>
        </a>
        <nav class="site-nav" aria-label="工具导航">
            <a href="../index.html#tools">小工具</a>
            <a href="../index.html#games">小游戏</a>
        </nav>
    </header>

    <main class="tool-shell">
        <a class="back-link" href="../index.html#tools">返回小工具</a>
        <section class="tool-hero" aria-labelledby="tool-title">
            <p class="eyebrow">Tool</p>
            <h1 id="tool-title">随机数生成器</h1>
            <p>输入最小值、最大值和生成个数，选择是否允许重复，结果会按小块排列出来。</p>
        </section>

        <section class="tool-panel" aria-label="随机数表单">
            <form id="randomNumberForm" novalidate>
                <div class="field-grid">
                    <div class="field">
                        <label for="minValue">最小值</label>
                        <input type="number" id="minValue" value="1" inputmode="numeric">
                    </div>
                    <div class="field">
                        <label for="maxValue">最大值</label>
                        <input type="number" id="maxValue" value="100" inputmode="numeric">
                    </div>
                    <div class="field">
                        <label for="count">生成个数</label>
                        <input type="number" id="count" value="1" min="1" inputmode="numeric">
                    </div>
                    <div class="field">
                        <label for="allowDuplicates">允许重复</label>
                        <select id="allowDuplicates">
                            <option value="true">允许</option>
                            <option value="false">不允许</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="button" type="submit">生成随机数</button>
                </div>
            </form>

            <section class="result-panel" id="resultPanel" hidden aria-live="polite">
                <h2 id="resultTitle">随机数</h2>
                <p class="result-copy" id="resultCopy"></p>
                <div class="chip-list" id="randomNumberContainer"></div>
            </section>
        </section>
    </main>

    <script>
        const form = document.getElementById("randomNumberForm");
        const resultPanel = document.getElementById("resultPanel");
        const resultTitle = document.getElementById("resultTitle");
        const resultCopy = document.getElementById("resultCopy");
        const randomNumberContainer = document.getElementById("randomNumberContainer");

        function showError(message) {
            resultPanel.hidden = false;
            resultPanel.classList.add("is-error");
            resultTitle.textContent = "需要再检查一下";
            resultCopy.textContent = message;
            randomNumberContainer.replaceChildren();
        }

        function showNumbers(numbers, minValue, maxValue, allowDuplicates) {
            const chips = numbers.map((number) => {
                const chip = document.createElement("span");
                chip.className = "chip";
                chip.textContent = number;
                return chip;
            });

            resultPanel.hidden = false;
            resultPanel.classList.remove("is-error");
            resultTitle.textContent = "随机数";
            resultCopy.textContent = `范围 ${minValue} 到 ${maxValue}，共 ${numbers.length} 个，${allowDuplicates ? "允许重复" : "不允许重复"}。`;
            randomNumberContainer.replaceChildren(...chips);
        }

        function generateRandomNumbers(event) {
            event.preventDefault();

            const minValue = Number.parseInt(document.getElementById("minValue").value, 10);
            const maxValue = Number.parseInt(document.getElementById("maxValue").value, 10);
            const count = Number.parseInt(document.getElementById("count").value, 10);
            const allowDuplicates = document.getElementById("allowDuplicates").value === "true";

            if (!Number.isInteger(minValue) || !Number.isInteger(maxValue) || !Number.isInteger(count) || count <= 0) {
                showError("请输入有效的数值范围和生成个数。");
                return;
            }

            if (minValue > maxValue) {
                showError("最小值不能大于最大值。");
                return;
            }

            const range = maxValue - minValue + 1;

            if (!allowDuplicates && count > range) {
                showError("不允许重复时，生成个数不能超过可选数字总数。");
                return;
            }

            const numbers = [];

            if (allowDuplicates) {
                for (let index = 0; index < count; index += 1) {
                    numbers.push(Math.floor(Math.random() * range) + minValue);
                }
            } else {
                const availableNumbers = Array.from({ length: range }, (_, index) => minValue + index);

                for (let index = 0; index < count; index += 1) {
                    const randomIndex = Math.floor(Math.random() * availableNumbers.length);
                    numbers.push(availableNumbers[randomIndex]);
                    availableNumbers.splice(randomIndex, 1);
                }
            }

            showNumbers(numbers, minValue, maxValue, allowDuplicates);
        }

        form.addEventListener("submit", generateRandomNumbers);
    </script>
</body>

</html>
