<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="把成员随机打乱并平均分组。">
    <title>随机分组 | Starki</title>
    <link rel="icon" href="../images/head.jpg">
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header class="site-header">
        <a class="brand" href="../index.html" aria-label="返回 Starki 主页">
            <img src="../images/head.jpg" alt="Starki 的头像">
            <span>Starki</span>
        </a>
        <nav class="site-nav" aria-label="工具导航">
            <a href="../index.html#tools">工具</a>
            <a href="../index.html#games">游戏</a>
        </nav>
    </header>

    <main class="tool-shell">
        <a class="back-link" href="../index.html#tools">返回工具</a>
        <section class="tool-hero" aria-labelledby="tool-title">
            <p class="eyebrow">Tool</p>
            <h1 id="tool-title">随机分组</h1>
            <p>输入人数和组数，也可以粘贴姓名名单；名单按一行一个名字填写时，会优先使用名单。</p>
        </section>

        <section class="tool-panel" aria-label="随机分组表单">
            <form id="groupForm" novalidate>
                <div class="field-grid">
                    <div class="field">
                        <label for="numPeople">人数</label>
                        <input type="number" id="numPeople" value="8" min="1" max="500" inputmode="numeric">
                    </div>
                    <div class="field">
                        <label for="numGroups">组数</label>
                        <input type="number" id="numGroups" value="4" min="1" max="500" inputmode="numeric">
                    </div>
                    <div class="field full">
                        <label for="names">成员名单（可选）</label>
                        <textarea id="names" placeholder="例如：&#10;张三&#10;李四&#10;王五"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="button" type="submit">生成分组</button>
                </div>
            </form>

            <section class="result-panel" id="resultPanel" hidden>
                <h2 id="resultTitle">分组结果</h2>
                <p class="result-copy" id="resultCopy" role="status" aria-live="polite"></p>
                <div class="group-grid" id="groupContainer"></div>
            </section>
        </section>
    </main>

    <script src="./js/random_groups.js"></script>
</body>

</html>
