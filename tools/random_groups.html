<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="把成员随机打乱并平均分组。">
    <title>随机分组 | Starki</title>
    <link rel="icon" href="../images/head.jpg">
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header class="site-header">
        <a class="brand" href="../index.html" aria-label="返回 Starki 主页">
            <img src="../images/head.jpg" alt="Starki 的头像">
            <span>Starki</span>
        </a>
        <nav class="site-nav" aria-label="工具导航">
            <a href="../index.html#tools">小工具</a>
            <a href="../index.html#games">小游戏</a>
        </nav>
    </header>

    <main class="tool-shell">
        <a class="back-link" href="../index.html#tools">返回小工具</a>
        <section class="tool-hero" aria-labelledby="tool-title">
            <p class="eyebrow">Tool</p>
            <h1 id="tool-title">随机分组</h1>
            <p>输入人数和组数，也可以粘贴姓名名单；名单按一行一个名字填写时，会优先使用名单。</p>
        </section>

        <section class="tool-panel" aria-label="随机分组表单">
            <form id="groupForm" novalidate>
                <div class="field-grid">
                    <div class="field">
                        <label for="numPeople">人数</label>
                        <input type="number" id="numPeople" value="8" min="1" inputmode="numeric">
                    </div>
                    <div class="field">
                        <label for="numGroups">组数</label>
                        <input type="number" id="numGroups" value="4" min="1" inputmode="numeric">
                    </div>
                    <div class="field full">
                        <label for="names">成员名单（可选）</label>
                        <textarea id="names" placeholder="例如：&#10;张三&#10;李四&#10;王五"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="button" type="submit">生成分组</button>
                </div>
            </form>

            <section class="result-panel" id="resultPanel" hidden aria-live="polite">
                <h2 id="resultTitle">分组结果</h2>
                <p class="result-copy" id="resultCopy"></p>
                <div class="group-grid" id="groupContainer"></div>
            </section>
        </section>
    </main>

    <script>
        const form = document.getElementById("groupForm");
        const resultPanel = document.getElementById("resultPanel");
        const resultTitle = document.getElementById("resultTitle");
        const resultCopy = document.getElementById("resultCopy");
        const groupContainer = document.getElementById("groupContainer");

        function showError(message) {
            resultPanel.hidden = false;
            resultPanel.classList.add("is-error");
            resultTitle.textContent = "需要再检查一下";
            resultCopy.textContent = message;
            groupContainer.replaceChildren();
        }

        function getPeople(numPeople) {
            const names = document.getElementById("names").value
                .split(/\r?\n/)
                .map((name) => name.trim())
                .filter(Boolean);

            if (names.length > 0) {
                return names;
            }

            return Array.from({ length: numPeople }, (_, index) => `成员 ${index + 1}`);
        }

        function shuffle(items) {
            const shuffled = [...items];

            for (let index = shuffled.length - 1; index > 0; index -= 1) {
                const randomIndex = Math.floor(Math.random() * (index + 1));
                [shuffled[index], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[index]];
            }

            return shuffled;
        }

        function renderGroups(groups, peopleCount) {
            const groupBoxes = groups.map((group, index) => {
                const box = document.createElement("article");
                const title = document.createElement("h3");
                const list = document.createElement("ul");

                box.className = "group-box";
                title.textContent = `第 ${index + 1} 组`;
                list.className = "group-list";

                group.forEach((person) => {
                    const item = document.createElement("li");
                    item.textContent = person;
                    list.appendChild(item);
                });

                box.append(title, list);
                return box;
            });

            resultPanel.hidden = false;
            resultPanel.classList.remove("is-error");
            resultTitle.textContent = "分组结果";
            resultCopy.textContent = `共 ${peopleCount} 人，分成 ${groups.length} 组。`;
            groupContainer.replaceChildren(...groupBoxes);
        }

        function generateGroups(event) {
            event.preventDefault();

            const numPeople = Number.parseInt(document.getElementById("numPeople").value, 10);
            const numGroups = Number.parseInt(document.getElementById("numGroups").value, 10);

            if (!Number.isInteger(numPeople) || !Number.isInteger(numGroups) || numPeople <= 0 || numGroups <= 0) {
                showError("请输入有效的人数和组数。");
                return;
            }

            const people = shuffle(getPeople(numPeople));

            if (numGroups > people.length) {
                showError("组数不能大于成员人数。");
                return;
            }

            const groups = Array.from({ length: numGroups }, () => []);

            people.forEach((person, index) => {
                groups[index % numGroups].push(person);
            });

            renderGroups(groups, people.length);
        }

        form.addEventListener("submit", generateGroups);
    </script>
</body>

</html>
