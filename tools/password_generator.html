<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="按长度和字符类型生成随机密码。">
    <title>密码生成器 | Starki</title>
    <link rel="icon" href="../images/head.jpg">
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header class="site-header">
        <a class="brand" href="../index.html" aria-label="返回 Starki 主页">
            <img src="../images/head.jpg" alt="Starki 的头像">
            <span>Starki</span>
        </a>
        <nav class="site-nav" aria-label="工具导航">
            <a href="../index.html#tools">小工具</a>
            <a href="../index.html#games">小游戏</a>
        </nav>
    </header>

    <main class="tool-shell">
        <a class="back-link" href="../index.html#tools">返回小工具</a>
        <section class="tool-hero" aria-labelledby="tool-title">
            <p class="eyebrow">Tool</p>
            <h1 id="tool-title">密码生成器</h1>
            <p>选择长度和字符类型，生成一个随机密码。</p>
        </section>

        <section class="tool-panel" aria-label="密码生成表单">
            <form id="passwordForm" novalidate>
                <div class="field-grid">
                    <div class="field">
                        <label for="passwordLength">密码长度</label>
                        <input type="number" id="passwordLength" value="16" min="4" max="64" inputmode="numeric">
                    </div>
                    <fieldset class="field option-field">
                        <legend>字符类型</legend>
                        <label><input type="checkbox" id="useLowercase" checked> 小写字母</label>
                        <label><input type="checkbox" id="useUppercase" checked> 大写字母</label>
                        <label><input type="checkbox" id="useNumbers" checked> 数字</label>
                        <label><input type="checkbox" id="useSymbols" checked> 符号</label>
                        <label><input type="checkbox" id="avoidSimilar"> 避开易混淆字符</label>
                    </fieldset>
                </div>
                <div class="form-actions">
                    <button class="button" type="submit">生成密码</button>
                    <button class="button secondary" type="button" id="copyButton">复制密码</button>
                </div>
            </form>

            <section class="result-panel" id="resultPanel" hidden aria-live="polite">
                <h2 id="resultTitle">生成结果</h2>
                <p class="result-copy" id="resultCopy"></p>
                <p class="mono-output" id="passwordOutput"></p>
            </section>
        </section>
    </main>

    <script>
        const characterSets = {
            lowercase: "abcdefghijklmnopqrstuvwxyz",
            uppercase: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            numbers: "0123456789",
            symbols: "!@#$%^&*()-_=+[]{};:,.<>?"
        };
        const similarCharacters = /[0Ool1I]/g;
        const form = document.getElementById("passwordForm");
        const copyButton = document.getElementById("copyButton");
        const resultPanel = document.getElementById("resultPanel");
        const resultTitle = document.getElementById("resultTitle");
        const resultCopy = document.getElementById("resultCopy");
        const passwordOutput = document.getElementById("passwordOutput");

        function getRandomIndex(max) {
            if (window.crypto && window.crypto.getRandomValues) {
                const randomValues = new Uint32Array(1);
                window.crypto.getRandomValues(randomValues);
                return randomValues[0] % max;
            }

            return Math.floor(Math.random() * max);
        }

        function pickOne(characters) {
            return characters[getRandomIndex(characters.length)];
        }

        function shuffleCharacters(characters) {
            const shuffled = [...characters];

            for (let index = shuffled.length - 1; index > 0; index -= 1) {
                const randomIndex = getRandomIndex(index + 1);
                [shuffled[index], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[index]];
            }

            return shuffled.join("");
        }

        function showError(message) {
            resultPanel.hidden = false;
            resultPanel.classList.add("is-error");
            resultTitle.textContent = "需要再检查一下";
            resultCopy.textContent = message;
            passwordOutput.textContent = "";
        }

        function getSelectedSets() {
            const avoidSimilar = document.getElementById("avoidSimilar").checked;
            const selectedSets = [];

            [
                ["useLowercase", characterSets.lowercase],
                ["useUppercase", characterSets.uppercase],
                ["useNumbers", characterSets.numbers],
                ["useSymbols", characterSets.symbols]
            ].forEach(([id, characters]) => {
                if (document.getElementById(id).checked) {
                    const filtered = avoidSimilar ? characters.replace(similarCharacters, "") : characters;

                    if (filtered) {
                        selectedSets.push(filtered);
                    }
                }
            });

            return selectedSets;
        }

        function generatePassword(event) {
            event.preventDefault();

            const passwordLength = Number.parseInt(document.getElementById("passwordLength").value, 10);
            const selectedSets = getSelectedSets();

            if (!Number.isInteger(passwordLength) || passwordLength < 4 || passwordLength > 64) {
                showError("密码长度需要在 4 到 64 之间。");
                return;
            }

            if (selectedSets.length === 0) {
                showError("请至少选择一种字符类型。");
                return;
            }

            if (selectedSets.length > passwordLength) {
                showError("密码长度不能小于已选择的字符类型数量。");
                return;
            }

            const allCharacters = selectedSets.join("");
            const passwordCharacters = selectedSets.map(pickOne);

            while (passwordCharacters.length < passwordLength) {
                passwordCharacters.push(pickOne(allCharacters));
            }

            resultPanel.hidden = false;
            resultPanel.classList.remove("is-error");
            resultTitle.textContent = "生成结果";
            resultCopy.textContent = `长度 ${passwordLength}，使用了 ${selectedSets.length} 种字符类型。`;
            passwordOutput.textContent = shuffleCharacters(passwordCharacters);
            copyButton.textContent = "复制密码";
        }

        async function copyPassword() {
            const password = passwordOutput.textContent;

            if (!password) {
                showError("请先生成一个密码。");
                return;
            }

            if (!navigator.clipboard) {
                showError("当前浏览器不支持自动复制，请手动选中密码复制。");
                return;
            }

            try {
                await navigator.clipboard.writeText(password);
                copyButton.textContent = "已复制";
            } catch (error) {
                showError("复制失败了，请手动选中密码复制。");
            }
        }

        form.addEventListener("submit", generatePassword);
        copyButton.addEventListener("click", copyPassword);
        form.dispatchEvent(new Event("submit"));
    </script>
</body>

</html>
