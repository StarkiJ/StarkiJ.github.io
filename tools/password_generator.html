<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="按长度和字符类型生成随机密码。">
    <title>密码生成器 | Starki</title>
    <link rel="icon" href="../images/head.jpg">
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header class="site-header">
        <a class="brand" href="../index.html" aria-label="返回 Starki 主页">
            <img src="../images/head.jpg" alt="Starki 的头像">
            <span>Starki</span>
        </a>
        <nav class="site-nav" aria-label="工具导航">
            <a href="../index.html#tools">工具</a>
            <a href="../index.html#games">游戏</a>
        </nav>
    </header>

    <main class="tool-shell">
        <a class="back-link" href="../index.html#tools">返回工具</a>
        <section class="tool-hero" aria-labelledby="tool-title">
            <p class="eyebrow">Tool</p>
            <h1 id="tool-title">密码生成器</h1>
            <p>选择长度和字符类型，生成一个随机密码。</p>
        </section>

        <section class="tool-panel" aria-label="密码生成表单">
            <form id="passwordForm" novalidate>
                <div class="field-grid">
                    <div class="field">
                        <label for="passwordLength">密码长度</label>
                        <input type="number" id="passwordLength" value="16" min="4" max="64" inputmode="numeric">
                    </div>
                    <fieldset class="field option-field">
                        <legend>字符类型</legend>
                        <label><input type="checkbox" id="useLowercase" checked> 小写字母</label>
                        <label><input type="checkbox" id="useUppercase" checked> 大写字母</label>
                        <label><input type="checkbox" id="useNumbers" checked> 数字</label>
                        <label><input type="checkbox" id="useSymbols" checked> 符号</label>
                        <label><input type="checkbox" id="avoidSimilar"> 避开易混淆字符</label>
                    </fieldset>
                </div>
                <div class="form-actions">
                    <button class="button" type="submit">生成密码</button>
                    <button class="button secondary" type="button" id="copyButton">复制密码</button>
                </div>
            </form>

            <section class="result-panel" id="resultPanel" hidden>
                <h2 id="resultTitle">生成结果</h2>
                <p class="result-copy" id="resultCopy" role="status" aria-live="polite"></p>
                <p class="mono-output" id="passwordOutput"></p>
            </section>
        </section>
    </main>

    <script src="./js/password_generator.js"></script>
</body>

</html>
